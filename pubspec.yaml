name: bluesense
description: BlueSense Resort Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  go_router: ^13.2.0
  fl_chart: ^0.67.0
  intl: ^0.19.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  table_calendar: ^3.0.9
  file_picker: ^8.0.3
  url_launcher: ^6.2.5
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  firebase_core: ^2.29.0
  firebase_auth: ^4.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/hero/
    - assets/images/package/
    - assets/images/gallery/
    - assets/icons/

flutter_icons:
  ios: true
  android: true
  image_path: "assets/icons/resort-logo.jpg"
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: "assets/icons/resort-logo.jpg"
